server {
    listen 80;
    server_name _;

    # Static SPA
    root /usr/share/nginx/html;
    index index.html;

    # gzip & cache for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # API proxies (service DNS names from docker-compose)
    # SSE stream must not buffer. Declare a dedicated location BEFORE
    # the generic /api/audit/ block so it takes precedence.
    location = /api/audit/stream {
        proxy_pass http://audit:8022/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    location /api/audit/        { proxy_pass http://audit:8022/; }
    location /api/orchestrator/ { proxy_pass http://orchestrator:8021/; }
    location /api/simulator/    { proxy_pass http://simulator:8023/; }
    location /api/collector/    { proxy_pass http://collector:8001/; }
    location /api/detector/     { proxy_pass http://detector:8000/; }
    location /api/policy/       { proxy_pass http://policy_engine:8020/; }
    location /api/osint/        { proxy_pass http://osint:8028/; }
    location /api/llm/          { proxy_pass http://llm_assistant:8024/; }
    location /api/federated/    { proxy_pass http://aggregator:8010/; }
    location /api/traffic/      { proxy_pass http://traffic_ingestor:8027/; }

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
